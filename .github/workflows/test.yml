name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests (with frozen TLC freshness)
        env:
          # SIFR_TLC_FROZEN=1 makes the formal-artifact freshness checks
          # fail-closed: the committed model_hashes.json must agree with
          # the committed sifr_capability.tla, MC.cfg, and tlc_output.txt.
          # CI does NOT re-run TLC; it verifies the committed evidence.
          SIFR_TLC_FROZEN: "1"
        run: pytest -q
