// Apalache configuration for symbolic-bounded model checking of
// `sifr_capability.tla`.
//
// Apalache is a TLA+ symbolic checker (Konnov et al., 2019) that explores
// state space using SMT instead of explicit enumeration. It complements
// TLC's bounded enumeration: same model, same invariants, different
// search strategy.
//
// Run from the repo root:
//
//   apalache-mc check \
//       --config=formal/apalache.cfg \
//       --inv=SecureCapabilityLifecycle \
//       --length=20 \
//       formal/sifr_capability.tla
//
// The `--length=20` bound is intentionally larger than TLC's 5 — symbolic
// search can usually go deeper before SMT timeouts.
//
// Honest non-claim: SIFR has not yet executed Apalache as part of CI. The
// authors verified the TLA+ specification with TLC; this file is shipped
// so that any Apalache-equipped reviewer can re-run the symbolic check.
// See docs/formal_scope.md for the bounded-vs-symbolic-vs-inductive
// claim levels.

CONSTANTS
  Caps     = { "c1", "c2" }
  Subs     = { "s1", "s2" }
  Issuers  = { "i1" }
  Acts     = { "a1", "a2" }
  Msgs     = { "m1", "m2", "m3" }
  Kids     = { "k1", "k2" }
  MaxCalls = 2

INIT Init
NEXT Next
INVARIANT SecureCapabilityLifecycle
